name: Test Stacktape Deploy
on: workflow_dispatch
jobs:
  deploy:
    runs-on: [self-hosted, stacktape]
    steps:
      - uses: actions/checkout@v4
      - name: Check Stacktape API key
        run: |
          echo "STACKTAPE_API_KEY is set = $([ -n "$STACKTAPE_API_KEY" ] && echo YES || echo NO)"
          echo "STP_CUSTOM_TRPC_API_ENDPOINT = $STP_CUSTOM_TRPC_API_ENDPOINT"
      - name: Setup Node via fnm
        run: |
          export FNM_DIR="$HOME/.local/share/fnm"
          eval "$($FNM_DIR/fnm env --shell bash)"
          node --version
          npm --version
      - name: Install Stacktape and deploy
        run: |
          export FNM_DIR="$HOME/.local/share/fnm"
          eval "$($FNM_DIR/fnm env --shell bash)"
          npm i -g stacktape@latest
          stacktape deploy --stage gh-runner-test --region eu-west-1 --projectName lambda-starter
